# Tinfoil container configuration for the Vita Aubrai chat proxy.
#
# Once an image is published the SHA256 digest below is what Tinfoil's
# remote attestation cryptographically binds to. The browser's SecureClient
# verifies this same digest before forwarding any HPKE-encrypted prompt
# bytes — so swapping the image without re-publishing the config will be
# rejected by every connected client.
#
# This repository intentionally contains ONLY this file (plus a README).
# It is public so the config can be independently audited by anyone.
# The proxy source code lives in the private VitaDAO/vita-app repo under
# tinfoil-proxy/, and the built image is published to the public GHCR
# package ghcr.io/vitadao/vita-tinfoil-proxy.

cvm-version: 0.7.1

# Smallest viable tier for I/O-bound proxy work. Bump only if a future
# handler needs more memory (e.g. heavier in-enclave AI flows).
cpus: 2
memory: 8192

containers:
  - name: vita-proxy
    # IMPORTANT: pin the image by digest so the verified hash is immutable.
    # Do NOT use `:latest`. The `:main` tag is included as a human-readable
    # pointer only — Tinfoil binds verification to the `@sha256:...` suffix.
    #
    # v0.1.4 (this release) adds /api/generate-protocol and
    # /api/generate-protocol-status, migrating the protocol-GENERATION
    # flow out of a Supabase edge function into this enclave. Mirrors
    # the v0.1.3 refine-protocol migration but covers the initial
    # generation path. Privacy wins:
    #   1. Aubrai scientist (x402-api.aubr.ai) is forwarded from inside
    #      the attested enclave.
    #   2. Structuring step (free-form scientist text → machine-readable
    #      protocol JSON via tool calling) replaced Google Gemini 2.5
    #      Flash with Tinfoil Inference Kimi K2.5. The whole pipeline
    #      now flows through Tinfoil-attested infra only.
    #   3. The old edge function's plaintext reads of biomarker_readings,
    #      biomarker_trends, and wearable_readings are gone — the client
    #      assembles the full 8-section context client-side and ships
    #      only the opaque promptText through HPKE to this enclave.
    #
    # v0.1.3 (previous release) added /api/refine-protocol, which did
    # the same migration for protocol refinement (Operational AI).
    # v0.1.2 added /api/aubrai-x402-daily-insight.
    image: "ghcr.io/vitadao/vita-tinfoil-proxy:main@sha256:b04bdbdff1f019db7c2f912314f935f957034b0ebd7e1c3d4ae67c8359102630"
    env:
      - PORT: "8080"
    secrets:
      # All six are set in the Tinfoil dashboard. They are sealed under
      # the enclave's measurement and only decrypted inside the attested VM.
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - X402_WALLET_PRIVATE_KEY
      - SUPERMEMORY_API_KEY
      # Tinfoil Inference API key — used by the /api/refine-protocol
      # handler to call inference.tinfoil.sh (Kimi K2.5) as the
      # Operational AI that refines user protocols. Paste without
      # surrounding quotes in the Tinfoil dashboard.
      - TINFOIL_API_KEY

# Tinfoil's reverse-proxy shim terminates TLS, then maps each external
# path below onto the upstream-port inside the VM. Anything not in this
# list is rejected by the shim before reaching the container.
shim:
  upstream-port: 8080
  paths:
    - /health
    - /api/aubrai-x402-chat
    - /api/supermemory-context
    - /api/aubrai-x402-status
    - /api/aubrai-x402-daily-insight
    - /api/refine-protocol
    - /api/generate-protocol
    - /api/generate-protocol-status
