# Tinfoil container configuration for the Vita Aubrai chat proxy.
#
# Once an image is published the SHA256 digest below is what Tinfoil's
# remote attestation cryptographically binds to. The browser's SecureClient
# verifies this same digest before forwarding any HPKE-encrypted prompt
# bytes — so swapping the image without re-publishing the config will be
# rejected by every connected client.
#
# This repository intentionally contains ONLY this file (plus a README).
# It is public so the config can be independently audited by anyone.
# The proxy source code lives in the private VitaDAO/vita-app repo under
# tinfoil-proxy/, and the built image is published to the public GHCR
# package ghcr.io/vitadao/vita-tinfoil-proxy.

cvm-version: 0.7.1

# Smallest viable tier for I/O-bound proxy work. Bump only if a future
# handler needs more memory (e.g. heavier in-enclave AI flows).
cpus: 2
memory: 8192

containers:
  - name: vita-proxy
    # IMPORTANT: pin the image by digest so the verified hash is immutable.
    # Do NOT use `:latest`. The `:main` tag is included as a human-readable
    # pointer only — Tinfoil binds verification to the `@sha256:...` suffix.
    #
    # v0.1.42 (this release) hardens the lab parser against three
    # classes of model failure observed in production against three
    # real-world lab PDFs (Romanian Sanador, Swiss Familienpraxis,
    # Malaysian Prince Court — saved as regression fixtures under
    # vita-app/scripts/regression-fixtures/v0.1.41-*).
    #
    # 1. Per-slice routing for multi-page input. The handler used to
    #    silently ignore `fallback_slices` when text-extraction of
    #    `file_data` succeeded — net effect on the Malaysian fixture
    #    (7 photographed pages uploaded as a multi-image batch) was
    #    11 of 55 biomarkers returned, with pages 2-7 dropped without
    #    warning. Now: when the request carries 2+ slices, the handler
    #    bypasses primary text-extraction and runs vision per slice,
    #    merging by confidence-dedup. Single-page inputs unchanged.
    #    Validated improvements: PDF 3 11/55 → 50/55, PDF 1 17/29 →
    #    24/29, PDF 2 holds 43/45.
    #
    # 2. Sanity-range filter (~50 hardcoded max-plausible bounds —
    #    Hb 5–25 g/dL, Iron 10–500 µg/dL, etc., wide enough to admit
    #    critical-care extremes). Drops + warns any value outside.
    #    Catches the Iron-22×-off (PDF 1: 4.29 mg/dL real-value
    #    96 µg/dL) and Hgb-decimal-slip (PDFs 1+2: 1.43-1.46 real
    #    14.3-14.6) classes that all upstream paths ship with
    #    confidence 1.00. New file
    #    `tinfoil-proxy/src/lib/biomarkerSanityRanges.ts`.
    #
    # 3. Anti-hallucination filter. Maintains a haystack of every
    #    chunk of OCR'd / text-extracted source content during the
    #    request; drops any returned biomarker whose name (or
    #    catalog alias) doesn't appear in the haystack. Catches the
    #    structurer's tendency to fabricate plausible-looking results
    #    at confidence 1.00 (ESR 2 mm/h hallucinated on PDF 2's
    #    Swiss lab — no ESR row in source; HIV Ag/Ab hallucinated on
    #    PDF 3's Malaysian lab — no HIV test in source). Permissive
    #    when haystack is empty (pure-image upload with no OCR
    #    sidecar). New file
    #    `tinfoil-proxy/src/lib/biomarkerHaystack.ts`.
    #
    # Plus three smaller changes:
    # - Value normaliser handles inline H/L abnormal flags
    #   ("1.17 L", "1.1 H"), footnote markers ("4.6 #1"), comparator
    #   operators (">90 eGFR", "<20 RF") and qualitative results
    #   (Reactive / Negative / Normal / Nil). New optional fields on
    #   the response biomarker shape: abnormal_flag, comparator,
    #   qualitative_value (with NaN value for the qualitative case
    #   so consumers know to check the field).
    # - Patient-sex pass-through into the system prompt (catches
    #   Estradiol-Female-applied-to-male on PDF 2). Was already in
    #   the request body but not woven into the structurer's context.
    # - Test harness `vita-app/scripts/parse-lab-test.ts` extended
    #   with --image-dir mode (matches browser
    #   downscaleImageForParsing — 2000px JPEG q85) and
    #   VITA_TEST_PER_PAGE=1 mode. Used to capture the v0.1.41
    #   regression fixtures.
    #
    # v0.1.41 restored three biomarker-name helper
    # functions (`stripParens`, `reverseWords`, `biomarkerNameToSlug`)
    # that had silently disappeared from
    # `tinfoil-proxy/src/handlers/parseLabResults.ts` on 2026-04-17.
    # Lovable's sync resolved a merge conflict by renaming the older
    # copy with a "(# Name clash 2026-04-17 ... #).ts" suffix; the
    # three helpers lived only in that orphaned file, but the live
    # handler still referenced them. Net effect at runtime: every
    # `/api/parse-lab-results` call hit
    #   ReferenceError: stripParens is not defined
    # for every biomarker-name variant it tried, the per-variant loop
    # bailed silently, and the response came back HTTP 200 with
    # `success: true` but `biomarkers: []` and the warnings array
    # exposing the failure. Surfaced via the new
    # `vita-app/scripts/parse-lab-test.ts` standalone smoke test that
    # mirrors the browser's SecureClient flow against the live enclave.
    # Fix is a paste-back of the three helpers verbatim from the
    # clash file; clash file deleted, plus two other unused clash
    # files in the same tree (literatureSearchStatus, server) that
    # had no orphaned references but were obvious cruft.
    #
    # v0.1.40 normalised the deep-mode prompt across
    # condition and non-condition tracked terms. v0.1.39's non-condition
    # variant used a thinner 6-item "provide a synthesis" framing and
    # upstream kept bailing with "evidence set too weak or too indirect
    # to support a confident synthesis". Meanwhile the 4-item
    # "tactical longevity optimization strategy" condition prompt has
    # been producing confident syntheses for months. This release
    # collapses to one deep prompt whose only difference between the
    # two paths is the opener:
    #   - condition     → "Given a patient managing ${term}, ..."
    #   - non-condition → "Given interest in ${term} for longevity, ..."
    # Everything after the comma is byte-identical so upstream's deep
    # pipeline gets the same structured query in both cases. The
    # condition prompt's condition-specific phrasing ("mitigate the
    # condition's impact on healthspan and lifespan") was swapped for
    # the neutral "interventions relevant to ${term}" so the shared
    # body reads cleanly for either a chronic condition or a tracked
    # intervention — keep an eye on condition-scan quality after this
    # lands and tune further if needed.
    #
    # v0.1.39 added a dedicated deep-mode prompt for non-condition
    # tracked terms (rapamycin, NMN, creatine, etc.). Deep scans on
    # non-condition terms had been coming back in ~72 s with "The
    # initial search did not retrieve enough relevant evidence, and
    # no better follow-up search plan could be generated." The old
    # `buildQuestion` in literatureHelpers.ts only branched into the
    # rich structured prompt when `mode === "deep" && isCondition`
    # — everything else (including deep scans on non-condition terms)
    # fell through to the generic fast-mode one-liner, which gave
    # upstream's deep pipeline too little to work with for the follow-
    # up query planner. Latent bug since the original Supabase edge
    # function — only surfaced now because v0.1.38 was the first
    # release that actually delivered the synthesis to the UI, making
    # the thin content visible.
    #
    # v0.1.38 made the literature-search status handler mode-aware
    # so deep-mode actually emits an Aubrai synthesis row. The old
    # if/else after HPKE-decrypt took the
    # `ingestReferences` branch whenever upstream returned any
    # papers (basically always) and buried the synthesis text as
    # an `ai_summary` field on each paper row — no row with
    # source:"aubrai" was ever emitted, so the Deep Analysis card
    # never appeared in the UI. Now the status handler reads
    # `mode: "fast" | "deep"` from the request body (default
    # "fast" for backwards compat) and the ingest is ADDITIVE:
    # papers always get pushed when upstream returned references[],
    # plus a synthesis row when mode === "deep".
    #
    # Also: `ingestDeepResults` in literatureIngest.ts dropped the
    # `if (rawItems.length > 0) return []` guard (now called
    # deliberately alongside references) and its synthesis row
    # uses a deterministic external_id `deep-synthesis-${userId}-
    # ${term}` — repeated deep scans update the same aubrai card
    # in place via HMAC dedup instead of piling up fresh cards.
    #
    # Paired client-side changes (vita-app): PendingJob carries a
    # `mode` field populated at kickoff by all three sites
    # (triggerPoll fast → fast; startDeepPoll + triggerDeepForTerm
    # → deep); mode is sent in every status body; pollJobs filters
    # deep rawItems to aubrai-source only before saving. Net UX:
    # global Scan writes fast papers + aubrai synthesis; per-term
    # Start Deep Search writes aubrai synthesis only and leaves
    # the article list untouched.
    #
    # v0.1.37 fixed a concurrent-poll race in
    # /api/literature-search/status that made deep-mode scans toast
    # "Encryption key expired. Please run the scan again." immediately
    # after the feed had populated with new articles. The client's 6 s
    # setInterval fires pollJobs without awaiting the previous tick,
    # and the upstream long-polls for up to 25 s — so 4-5 polls for
    # the same jobId are typically in flight when upstream flips to
    # `completed`. The old `retrieveAndDeleteKey` pattern let the
    # first poll succeed + delete the ephemeral key; overlapping polls
    # then saw `completed` from upstream, found an empty store, and
    # returned "Encryption key expired". The client's Promise.allSettled
    # wrote every fulfilled result over the earlier success, so network
    # variance decided whether the user saw success or a bogus error
    # toast on top of already-rendered articles.
    #
    # Now: new `peekEphemeralKey(id)` in ephemeralKeyStore returns a
    # fresh Uint8Array copy + bumps the sliding TTL WITHOUT deleting
    # the entry. literatureSearchStatus uses peek on the completed-
    # with-HPKE-fields path so every overlapping poll decrypts
    # successfully and returns the same rawItems; client-side HMAC
    # dedup in saveEncryptedResearchItems turns extra inserts into
    # no-op updates. Also stopped evicting the key on the "completed
    # but missing HPKE fields" branch (can be a brief upstream state-
    # transition artefact; letting the next poll recover is safer).
    # `retrieveAndDeleteKey` is retained only for the terminal
    # upstream-failed branch.
    #
    # Key cleanup is now 15-min TTL-driven. Slightly more memory
    # residency inside the attested enclave but zero correctness cost.
    #
    # v0.1.36 fixed a silent deep-mode failure: the ephemeral HPKE
    # key TTL (10 min) was exactly matching the upstream x402 deep-
    # scan duration, so the enclave was evicting the private key
    # mid-flight and the next poll came back with "Encryption key
    # expired. Please run the scan again." — no results, no visible
    # UI error (client treated the quiet 200 as terminal).
    #
    # Now: TTL is 15 min AND sliding — every status poll that sees the
    # upstream job still in flight (active/pending/queued/unknown) calls
    # `touchEphemeralKey(jobId)` to bump the deadline. In practice the
    # key lives as long as the client keeps polling; a client that
    # disappears for 15 consecutive minutes is treated as gone. If the
    # key has already been purged by the time a poll lands (container
    # restart, prior expiry), the handler now returns `{status:
    # "failed", error: "Encryption key expired..."}` immediately instead
    # of letting the client spin forever.
    #
    # Paired client-side changes (vita-app): (1) a `toast({variant:
    # destructive})` fires when any deep-mode job ends `failed`, so the
    # user sees the enclave's error string; (2) ResearchScanProvider
    # moved from Dashboard.tsx to App.tsx above <Routes> so deep polling
    # survives in-SPA navigation between /dashboard, /profile, etc.
    #
    # v0.1.35 stripped the TEMP `_debug` array from the
    # /api/literature-search kickoff response + removed the structural
    # `console.log` diagnostics sprinkled through the two literature
    # handlers while chasing the HPKE wrapping bug.
    # Also swallowed the remaining `console.error` / `console.warn`
    # calls with explanatory comments, since enclave container logs are
    # invisible to admins by design (logging to them is dead code).
    #
    # v0.1.34 completed the literature HPKE convention debugging.
    # v0.1.33 fixed the info strings (chat-private-v1) but left the
    # `{message: plaintext}` wrapper, which the literature TEE rejected
    # with `{"error":"Missing question in decrypted payload"}`. The
    # literature endpoint uses chat-style HPKE crypto but expects
    # the raw request-body JSON at the top level — no wrapper.
    # Added `hpkeEncryptRaw` to hpkeUtils.ts (same crypto, skips the
    # JSON wrap step) and swapped literatureSearch to call it.
    # aubraiChat / generateProtocol / dailyInsight / refineProtocol
    # keep using the wrapped `hpkeEncrypt` (still right for the chat
    # endpoint).
    #
    # v0.1.33 aligned literature HPKE info strings with chat
    # (hpkeLiterature.ts had been using "literature-private-v1" which
    # x402 rejected with "HPKE decryption failed").
    #
    # v0.1.32 was a comment-only bump that routed around browser SDK
    # caches holding stale v0.1.31 bytes from the earlier tag-recycling.
    #
    # v0.1.31 added a TEMP `_debug` array in the
    # /api/literature-search kickoff response body so the browser can
    # see which of the four `continue` branches is dropping every
    # term on the floor (empty jobs[] seen in smoke test after v0.1.30).
    # Enclave console.log is dead-letter (invisible to admins by
    # design), so diagnostics must travel back over HPKE. The debug
    # entries are structural only — lengths, status codes, JSON keys,
    # body-head snippets — no question text or reference content.
    # Scheduled for removal once the pipeline is verified.
    #
    # (NOTE: an earlier v0.1.31 tag existed with dead-letter console.log
    # only; that tag + release were deleted after confirming logs are
    # invisible. A second v0.1.31 was published with the `_debug`
    # payload but got stuck in browser SDK caches, hence v0.1.32.)
    #
    # v0.1.30 fixed two bugs in v0.1.29's Research Radar migration:
    #  1. Consent gate was `hasConsent("research")` but the client has
    #     no UI toggle for that scope. Swapped to `ai_insights` +
    #     `health_tracking` — same as generateProtocol / refineProtocol.
    #  2. `consentDeniedResponse` middleware was missing
    #     `Cache-Control: no-transform`, so the Tinfoil shim's brotli
    #     header bug turned 403s into `net::ERR_CONTENT_DECODING_FAILED`.
    #
    # v0.1.29 migrated Research Radar literature search into the enclave
    # and swapped the upstream x402 API from /api/literature (plaintext)
    # to /api/literature/encrypted (HPKE). Closes 3 threat surfaces:
    # x402 / path-to-TEE, Supabase admin, and edge-function log noise.
    # Adds /api/literature-search and /api/literature-search/status to
    # the shim allowlist.
    #
    # v0.1.28 improved the lab-parser biomarker matcher + auto-created
    # catalog rows (same image as v0.1.27 — Supabase-side changes only).
    # v0.1.27 migrated /api/parse-lab-results into the enclave.
    # v0.1.26 added Cache-Control: no-transform to all handler responses.
    # v0.1.25 added /api/suggest-condition.
    # v0.1.24 switched supplement parser to gemma4-31b + Firecrawl.
    # v0.1.9 made @tinfoilsh/verifier import dynamic (lazy).
    # v0.1.8 attempted static import of @tinfoilsh/verifier — 502.
    # v0.1.7 added HPKE encryption on all x402 prompts.
    # v0.1.6 finalised wearable token encryption (Phase 2).
    # v0.1.5 moved wearable OAuth + fetchers into the enclave.
    # v0.1.4 added /api/generate-protocol + /api/generate-protocol-status.
    # v0.1.3 added /api/refine-protocol.
    # v0.1.2 added /api/aubrai-x402-daily-insight.
    image: "ghcr.io/vitadao/vita-tinfoil-proxy:main@sha256:2325266e878c610cf477528ccacf52a873cbfffb3cc049dc8520b504446ddd6a"
    env:
      - PORT: "8080"
    secrets:
      # All fifteen are set in the Tinfoil dashboard. They are sealed
      # under the enclave's measurement and only decrypted inside the
      # attested VM. Paste all values without surrounding quotes —
      # the dashboard will bake literal `"` chars into values that
      # include them, which breaks parsing downstream.
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - X402_WALLET_PRIVATE_KEY
      - SUPERMEMORY_API_KEY
      # Tinfoil Inference API key — used by /api/refine-protocol and
      # /api/generate-protocol-status to call inference.tinfoil.sh
      # (Kimi K2.5) for the Operational AI and protocol structurer.
      - TINFOIL_API_KEY
      # NEW in v0.1.5 — wearable OAuth + token encryption.
      #
      # CONNECTION_TOKEN_KEK is a 32-byte AES-256 key (base64 encoded)
      # used by tinfoil-proxy/src/lib/connectionTokenCrypto.ts to
      # envelope-encrypt access_token / refresh_token before they are
      # written to oura_connections / whoop_connections /
      # withings_connections. Generate once with:
      #   openssl rand -base64 32
      # and BACK IT UP in a password manager and a paper envelope.
      # Losing this key makes every wearable connection in the DB
      # unrecoverable — every connected user would need to reconnect.
      - CONNECTION_TOKEN_KEK
      # Vendor OAuth client credentials — used by the enclave callback
      # + refresh handlers to exchange authorization codes for tokens.
      # Copy these from the existing Supabase secrets (they're the
      # same strings), not from fresh dashboard regenerations.
      - OURA_CLIENT_ID
      - OURA_CLIENT_SECRET
      - WHOOP_CLIENT_ID
      - WHOOP_CLIENT_SECRET
      - WITHINGS_CLIENT_ID
      - WITHINGS_CLIENT_SECRET
      # NEW in v0.1.7 — Aubrai enclave attestation for HPKE-encrypted
      # x402 prompts. The enclave fetches Aubrai's attested X25519
      # public key from AUBRAI_ENCLAVE_URL/enclave/attestation at boot,
      # caches it, and uses it to HPKE-encrypt every prompt before
      # forwarding through x402. AUBRAI_CONFIG_REPO is the GitHub repo
      # that Tinfoil SDK uses for attestation verification.
      - AUBRAI_ENCLAVE_URL
      - AUBRAI_CONFIG_REPO
      # Optional fallback: hex-encoded 32-byte X25519 HPKE public key.
      # Used if @tinfoilsh/verifier SDK doesn't work in Deno at runtime.
      # Weaker than attestation (no cryptographic proof of key provenance)
      # but keeps the encrypted x402 flow working. Get the value from
      # Alexandru / the Aubrai team.
      - AUBRAI_HPKE_PUBLIC_KEY
      # Firecrawl web search — used by /api/parse-supplement to enrich
      # branded supplement compound data. Only the product name is sent
      # from the enclave's IP; no user identity is exposed.
      - FIRECRAWL_API_KEY

# Tinfoil's reverse-proxy shim terminates TLS, then maps each external
# path below onto the upstream-port inside the VM. Anything not in this
# list is rejected by the shim before reaching the container.
shim:
  upstream-port: 8080
  paths:
    - /health
    - /api/aubrai-x402-chat
    - /api/supermemory-context
    - /api/aubrai-x402-status
    - /api/aubrai-x402-daily-insight
    - /api/refine-protocol
    - /api/generate-protocol
    - /api/generate-protocol-status
    # NEW in v0.1.5 — wearable OAuth + fetchers.
    # auth + fetch are HPKE POST (browser → SecureClient → enclave).
    # callback is a plain HTTPS GET used by the vendor to redirect
    # the browser back with a short-lived code in the query string.
    - /api/wearable/oura/auth
    - /api/wearable/oura/callback
    - /api/wearable/oura/fetch
    - /api/wearable/whoop/auth
    - /api/wearable/whoop/callback
    - /api/wearable/whoop/fetch
    - /api/wearable/withings/auth
    - /api/wearable/withings/callback
    - /api/wearable/withings/fetch
    # NEW in v0.1.20 — supplement parsing.
    - /api/parse-supplement
    # Condition autocomplete suggestions.
    - /api/suggest-condition
    # NEW in v0.1.27 — lab report parsing (migrated from Supabase edge function).
    - /api/parse-lab-results
    # NEW in v0.1.29 — Research Radar literature search (migrated from
    # Supabase edge functions literature-search-x402 + deep-job-poll).
    # Kickoff POST + long-poll status POST, both HPKE to the enclave.
    - /api/literature-search
    - /api/literature-search/status
